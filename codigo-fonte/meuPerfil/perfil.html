<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - clarimed</title>
    <link rel="stylesheet" href="../layout/global.css">
    <link rel="stylesheet" href="perfil.css">
    <link rel="icon" type="image/png" href="../../documentos/img/coração-clarimed (4).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img alt="logo Clarimed" src="../imagens/logo_Clarimed.png" />
    </header>
    <section>
        <div class="titulo-btn">
            <a href="../home/home.html" class="btn-voltar">
                <img alt="seta voltar" src="../imagens/seta_voltar.png">
            </a>
            <h1>Perfil</h1>
        </div>
        <h2>Dados cadastrais</h2>
        <div class="dados">
            <img src="../imagens/Perfil.png" alt="imagem de perfil" width="70px" />
            <div class="lista">
                <p><strong>Nome: </strong><span id="perfil-nome"></span></p>
                <p><strong>Idade: </strong><span id="perfil-idade"></span></p>
                <p><strong>Data de Nascimento: </strong><span id="perfil-data"></span></p>
                <p><strong>Sexo: </strong><span id="perfil-sexo"></span></p>
                <p><strong>Telefone: </strong><span id="perfil-telefone"></span></p>
            </div>
        </div>
        <div class="container">
            <div class="titulo">
                <h2>Remédios favoritos</h2>
                <h2>0</h2>
            </div>
            <div class="favoritos" style="display: none;">
                <div class="foto-nome">
                    <img src="../imagens/remedios-img/dipirona_monohidratada.png" alt="Imagem da caixa da dipiona monohidratada" />
                    <p>Dipirona Monohidratada</p>
                </div>
                <p>40 mg</p>
            </div>
            <div class="favoritos" style="display: none;">
                <div class="foto-nome">
                    <img src="../imagens/remedios-img/simeticona.png" alt="Imagem da caixa da dipiona monohidratada" />
                    <p>Simeticona</p>
                </div>
                <p>40 mg</p>
            </div>
            <div class="favoritos" style="display: none;">
                <div class="foto-nome">
                    <img src="../imagens/remedios-img/toragesic.png" alt="Imagem da caixa da dipiona monohidratada" />
                    <p>Toragesic</p>
                </div>
                <p>40 mg</p>
            </div>
        </div>
    </section>
    <section>
        <div class="botao">
            <a href="../home/home.html">Voltar à página principal</a>
        </div>
    </section>
    <footer>
        &copy; Todos os direitos reservados - 2026
    </footer>

    <script src="perfil.js"></script>
</body>

</html>
